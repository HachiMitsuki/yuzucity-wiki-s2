<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icarus | Yuzu City Wiki</title>
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="icarus">
<header class="topbar" id="topbar"></header>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main>
    <nav class="breadcrumb"><a href="index.html">🏙️ ホーム</a><span class="breadcrumb-sep">›</span><a href="dealer.html">カタログ</a><span class="breadcrumb-sep">›</span><span>Icarus</span></nav>
    <section>
      <div class="section-header">
        <h1 class="section-title"><span class="section-title-icon">🍰</span>Icarus</h1>
        <p class="section-subtitle">天空をテーマにしたメニュー・お食事 / お飲み物</p>
      </div>

      <div class="dealer-stats">
        <div class="dealer-stat"><div class="dealer-stat-num" id="total-count">0</div><div class="dealer-stat-label">総メニュー数</div></div>
        <div class="dealer-stat"><div class="dealer-stat-num" id="food-count">0</div><div class="dealer-stat-label">食べ物</div></div>
        <div class="dealer-stat"><div class="dealer-stat-num" id="drink-count">0</div><div class="dealer-stat-label">飲み物</div></div>
        <div class="dealer-stat"><div class="dealer-stat-num" id="set-count">0</div><div class="dealer-stat-label">セット</div></div>
      </div>

      <div class="dealer-controls">
        <div class="dealer-search">
          <span class="dealer-search-icon">🔍</span>
          <input type="text" id="icarusSearch" placeholder="メニュー名で検索…" oninput="renderIcarus()">
        </div>
        <select class="dealer-sort" id="icarusSort" onchange="renderIcarus()">
          <option value="name">名前順</option>
          <option value="price-asc">価格: 安い順</option>
          <option value="price-desc">価格: 高い順</option>
        </select>
        <span class="dealer-count">表示中: <strong id="display-count">0</strong> 件</span>
      </div>

      <div class="cat-filters" id="cat-filters"></div>
      <div class="menu-grid" id="menu-grid"></div>
    </section>
    <div id="pageNav"></div>
  </main>
</div>
<footer>
  🍋 <strong>Yuzu City Wiki</strong> · 非公式ガイド &nbsp;|&nbsp;
  <a href="https://x.com/yuzu_server" target="_blank">𝕏 @yuzu_server</a> ·
  <a href="https://discord.gg/gHCeUWFyyc" target="_blank">Discord</a>
</footer>
<script src="common.js"></script>
<script>
(function(){
  const IMG_BASE = "images/catalog/icarus/";

  const CATEGORIES = {
    food:  { label: "食べ物",   color: "#ff8866", icon: "🍰" },
    drink: { label: "飲み物",   color: "#66bbff", icon: "🥤" },
    set:   { label: "セット",   color: "#f4c430", icon: "🎁" },
  };

  // Pricing rule from folder structure:
  //   1つ3万 (individual) → ¥30,000 each
  //   2つで6万 (set)       → ¥60,000 for any 2 of the set items
  const ITEMS = [
    // 食べ物 (¥30,000 each)
    { id: 1,  name: "Angel Ikaring",         image: "AngelIkaring.png",       category: "food",  price: 30000 },
    { id: 2,  name: "Evening Pancakes",      image: "EveningPancakes.png",    category: "food",  price: 30000 },
    { id: 3,  name: "Midnight Parfait",      image: "MidnightParfait.png",    category: "food",  price: 30000 },
    { id: 4,  name: "Sunrise French Toast",  image: "SunriseFrenchToast.png", category: "food",  price: 30000 },

    // 飲み物 (¥30,000 each)
    { id: 5,  name: "Morning Glow Latte",    image: "MorningGlowLatte.png",   category: "drink", price: 30000 },
    { id: 6,  name: "Morning Grows",         image: "MorningGrows.png",       category: "drink", price: 30000 },
    { id: 7,  name: "Nightsky Cocktail",     image: "NightskyCocktail.png",   category: "drink", price: 30000 },
    { id: 8,  name: "Nightsky Coffee",       image: "NightskyCoffee.png",     category: "drink", price: 30000 },
    { id: 9,  name: "Sunset Soda",           image: "SunsetSoda.png",         category: "drink", price: 30000 },
    { id: 10, name: "Twilight Highball",     image: "TwilightHighball.png",   category: "drink", price: 30000 },

    // セット (2品で¥60,000)
    { id: 11, name: "Cloud Milktea + Sky Teafoods",
      images: ["CloudMilktea.png", "SkyTeafoods.png"],
      category: "set", price: 60000, setNote: "2品セット" },
  ];

  let currentCat = "all";

  function escapeHtml(s){
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function formatPrice(p){
    return `¥${p.toLocaleString()}`;
  }

  function buildCatFilters(){
    const el = document.getElementById("cat-filters");
    const cats = ["all", ...Object.keys(CATEGORIES)];
    el.innerHTML = cats.map(c => {
      const info = c === "all"
        ? { label: "すべて", color: "#f4c430", icon: "🏪" }
        : CATEGORIES[c];
      return `<div class="cat-pill${c === currentCat ? " active" : ""}"
        style="background:${info.color}22;color:${info.color};border-color:${info.color}55"
        onclick="selectIcarusCat('${c}')">${info.icon} ${escapeHtml(info.label)}</div>`;
    }).join("");
  }

  window.selectIcarusCat = function(cat){
    currentCat = cat;
    buildCatFilters();
    renderIcarus();
  };

  window.renderIcarus = function(){
    const q = (document.getElementById("icarusSearch").value || '').toLowerCase();
    const sort = document.getElementById("icarusSort").value;

    let list = ITEMS.filter(it => {
      if(currentCat !== "all" && it.category !== currentCat) return false;
      if(q && !it.name.toLowerCase().includes(q)) return false;
      return true;
    });

    if(sort === "price-asc") list.sort((a,b) => a.price - b.price);
    else if(sort === "price-desc") list.sort((a,b) => b.price - a.price);
    else list.sort((a,b) => a.name.localeCompare(b.name));

    document.getElementById("display-count").textContent = list.length;

    const grid = document.getElementById("menu-grid");
    if(list.length === 0){
      grid.innerHTML = `<div class="vehicle-empty"><div class="big-icon">🔍</div><p>該当するメニューが見つかりません</p></div>`;
      return;
    }

    grid.innerHTML = list.map(it => {
      const cat = CATEGORIES[it.category] || { label: it.category, color: "#888", icon: "🍽" };
      const setBadge = it.setNote
        ? `<span class="menu-set-badge">${escapeHtml(it.setNote)}</span>`
        : '';
      const imgs = Array.isArray(it.images) && it.images.length > 0 ? it.images : [it.image];
      const pairClass = imgs.length > 1 ? ' menu-img-pair' : '';
      const imageHtml = imgs.map(img => `
          <img
            src="${IMG_BASE}${encodeURIComponent(img)}"
            onerror="this.style.display='none'"
            alt="${escapeHtml(it.name)}"
            loading="lazy">
      `).join('');
      return `<div class="menu-card${imgs.length > 1 ? ' menu-card-set' : ''}">
        <div class="menu-img-wrap${pairClass}">
          ${imageHtml}
          ${setBadge}
          <div class="cat-bar" style="background:${cat.color}"></div>
        </div>
        <div class="card-body">
          <div class="menu-name">${escapeHtml(it.name)}</div>
          <div class="card-meta">
            <span class="cat-tag" style="background:${cat.color}22;color:${cat.color}">${cat.icon} ${escapeHtml(cat.label)}</span>
            <span class="card-price">${formatPrice(it.price)}</span>
          </div>
        </div>
      </div>`;
    }).join("");
  };

  function initStats(){
    document.getElementById("total-count").textContent = ITEMS.length;
    document.getElementById("food-count").textContent  = ITEMS.filter(i => i.category === "food").length;
    document.getElementById("drink-count").textContent = ITEMS.filter(i => i.category === "drink").length;
    document.getElementById("set-count").textContent   = ITEMS.filter(i => i.category === "set").length;
  }

  initStats();
  buildCatFilters();
  renderIcarus();
})();
</script>
</body>
</html>
