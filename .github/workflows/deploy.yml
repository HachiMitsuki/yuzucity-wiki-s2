name: Deploy to Cloudflare Pages

on:
  push:
    branches: [season2]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 51471c14c62a094fa6c39a438ec05b04
          command: pages deploy . --project-name=yuzucity-s2-wiki --branch=season2
