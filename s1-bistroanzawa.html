<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bistro Anzawa（Season 1 アーカイブ） | Yuzu City Wiki</title>
<link rel="stylesheet" href="styles.css?v=s2-fix1">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
.menu-desc{
  font-size:.8rem; color:var(--text-dim);
  margin:.2rem 0 .3rem; line-height:1.4;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
</style>
</head>
<body data-page="bistroanzawa">
<header class="topbar" id="topbar"></header>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main>
    <div class="s2-strip catalog"></div>
    <div class="notice notice-info" style="margin-bottom:1.5rem">
      <div class="notice-title">📦 Season 1 Beta のアーカイブ</div>
      Season 1 Beta（2026.05.01–05.31）当時の記録です。 <a href="archive.html">S1アーカイブトップ</a> ／ <a href="index.html">Season 2 トップへ</a>
    </div>
    <nav class="breadcrumb"><a href="index.html">🏙️ ホーム</a><span class="breadcrumb-sep">›</span><a href="dealer.html">カタログ</a><span class="breadcrumb-sep">›</span><span>Bistro Anzawa</span></nav>
    <section>
      <div class="section-header">
        <h1 class="section-title"><span class="section-title-icon">🍽️</span>Bistro Anzawa</h1>
        <p class="section-subtitle">食べ物・飲み物・ジョイントの専門ショップ</p>
      </div>

      <div class="dealer-stats">
        <div class="dealer-stat"><div class="dealer-stat-num" id="total-count">0</div><div class="dealer-stat-label">総メニュー数</div></div>
        <div class="dealer-stat"><div class="dealer-stat-num" id="food-count">0</div><div class="dealer-stat-label">食べ物</div></div>
        <div class="dealer-stat"><div class="dealer-stat-num" id="drink-count">0</div><div class="dealer-stat-label">飲み物</div></div>
        <div class="dealer-stat"><div class="dealer-stat-num" id="joint-count">0</div><div class="dealer-stat-label">ジョイント</div></div>
      </div>

      <div class="dealer-controls">
        <div class="dealer-search">
          <span class="dealer-search-icon">🔍</span>
          <input type="text" id="anzawaSearch" placeholder="メニュー名で検索…" oninput="renderAnzawa()">
        </div>
        <select class="dealer-sort" id="anzawaSort" onchange="renderAnzawa()">
          <option value="price-asc">価格: 安い順</option>
          <option value="price-desc">価格: 高い順</option>
          <option value="name">名前順</option>
        </select>
        <span class="dealer-count">表示中: <strong id="display-count">0</strong> 件</span>
      </div>

      <div class="cat-filters" id="cat-filters"></div>
      <div id="menu-grid"></div>
    </section>
    <div id="pageNav"></div>
  </main>
</div>
<footer>
  🍋 <strong>Yuzu City Wiki</strong> · 非公式ガイド &nbsp;|&nbsp;
  <a href="https://x.com/yuzu_server" target="_blank">𝕏 @yuzu_server</a>
</footer>
<script src="common.js?v=s2-fix1"></script>
<script>
(function(){
  const IMG_BASE = "images/catalog/bistroanzawa/";

  const CATEGORIES = {
    food:  { label: "食べ物",   color: "#ff8866", icon: "🍰" },
    drink: { label: "飲み物",   color: "#66bbff", icon: "🥤" },
    joint: { label: "ジョイント", color: "#9bd66b", icon: "🌿" },
  };

  const ITEMS = [
    // ¥30,000 食べ物 (16品)
    { id:  1, name: "meidoanzawa",      image: "meidoanzawa.png",      category: "food",  price: 30000, desc: "お帰りなさいませ！おねーちゃん！" },
    { id:  2, name: "one_chan_kaori_no1", image: "one_chan_kaori_no1.png", category: "food",  price: 30000, desc: "おねえちゃんの練り香水シリーズ第1弾。りんごの香り。" },
    { id:  3, name: "one_chan_kaori_no2", image: "one_chan_kaori_no2.png", category: "food",  price: 30000, desc: "おねえちゃんの練り香水シリーズ第2弾。バニラの香り。" },
    { id:  4, name: "akuserauranusu",   image: "akuserauranusu.png",   category: "food",  price: 30000, desc: "アクセラヌースのプリントクッキー" },
    { id:  5, name: "PinkSaltAnzawa",   image: "PinkSaltAnzawa.png",   category: "food",  price: 30000, desc: "ヒマラヤピンクソルト岩塩" },
    { id:  6, name: "PantyCookie",      image: "PantyCookie.png",      category: "food",  price: 30000, desc: "おねーちゃんのパンティークッキー" },
    { id:  7, name: "honmonokebab",     image: "honmonokebab.png",     category: "food",  price: 30000, desc: "伝説のケバブ（平行輸入品）" },
    { id:  8, name: "anzawamatuba",     image: "anzawamatuba.png",     category: "food",  price: 30000, desc: "エターナル松葉あんざわ。" },
    { id:  9, name: "yanmayaanzawa",    image: "yanmayaanzawa.png",    category: "food",  price: 30000, desc: "イタリアの3代続くピザ職人なりきりピザ。" },
    { id: 10, name: "goodbyeengen",     image: "goodbyeengen.png",     category: "food",  price: 30000, desc: "グッバイ塩言" },
    { id: 11, name: "visiontestAnzawa", image: "visiontestAnzawa.png", category: "food",  price: 30000, desc: "指さしで教えてよ" },
    { id: 12, name: "Anzawahappycookie", image: "Anzawahappycookie.png", category: "food", price: 30000, desc: "好きすぎて滅！" },
    { id: 13, name: "pokapick",         image: "pokapick.png",         category: "food",  price: 30000, desc: "ぽかぴっく！" },
    { id: 14, name: "airuucookie",      image: "airuucookie.png",      category: "food",  price: 30000, desc: "くっきーになりたくてぇー なぜならうまいからぁ！" },
    { id: 15, name: "akumaCookie",      image: "akumaCookie.png",      category: "food",  price: 30000, desc: "いんちょう柔軟クッキー" },
    { id: 16, name: "caroncookie",      image: "caroncookie.png",      category: "food",  price: 30000, desc: "開けてもらっていいですか？" },
    { id: 23, name: "worldisAnzawa",   image: "worldisAnzawa.png",    category: "food",  price: 30000, desc: "せかいでいちばんおひめさま" },

    // ¥30,000 飲み物 (2品)
    { id: 17, name: "carondrinkshampoo", image: "carondrinkshampoo.png", category: "drink", price: 30000, desc: "かろんおねーちゃん愛用シャンプ風 ドリンク" },
    { id: 18, name: "anzawanomatetya",  image: "anzawanomatetya.png",  category: "drink", price: 30000, desc: "YuzuCity4部リーグあんざわ監督のマテ茶" },

    // ¥50,000 ジョイント (4品)
    { id: 19, name: "wakame",           image: "wakame.png",           category: "joint", price: 50000, desc: "高齢者に人気。海藻のにおいがする。" },
    { id: 20, name: "CALON",            image: "CALON.png",            category: "joint", price: 50000, desc: "かろんおねーちゃんをイメージしたタバコ。" },
    { id: 21, name: "PongolaFamily",    image: "PongolaFamily.png",    category: "joint", price: 50000, desc: "不完全。だからこそいい。" },
    { id: 22, name: "anzawatoon",       image: "anzawatoon.png",       category: "joint", price: 50000, desc: "かろんおねーちゃんに潰された悲しき楽器。（ストレス解消グッズ）" },
  ];

  let currentCat = "all";

  function escapeHtml(s){
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function formatPrice(p){
    return `¥${p.toLocaleString()}`;
  }

  function buildCatFilters(){
    const el = document.getElementById("cat-filters");
    const cats = ["all", ...Object.keys(CATEGORIES)];
    el.innerHTML = cats.map(c => {
      const info = c === "all"
        ? { label: "すべて", color: "#f4c430", icon: "🏪" }
        : CATEGORIES[c];
      return `<div class="cat-pill${c === currentCat ? " active" : ""}"
        style="background:${info.color}22;color:${info.color};border-color:${info.color}55"
        onclick="selectAnzawaCat('${c}')">${info.icon} ${escapeHtml(info.label)}</div>`;
    }).join("");
  }

  window.selectAnzawaCat = function(cat){
    currentCat = cat;
    buildCatFilters();
    renderAnzawa();
  };

  function renderItemCard(it){
    const cat = CATEGORIES[it.category] || { label: it.category, color: "#888", icon: "🍽️" };
    return `<div class="menu-card">
      <div class="menu-img-wrap">
        <img
          src="${IMG_BASE}${encodeURIComponent(it.image)}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
          alt="${escapeHtml(it.name)}"
          loading="lazy">
        <div class="img-fallback">${cat.icon}</div>
        <div class="cat-bar" style="background:${cat.color}"></div>
      </div>
      <div class="card-body">
        <div class="menu-name">${escapeHtml(it.name)}</div>
        ${it.desc ? `<div class="menu-desc">${escapeHtml(it.desc)}</div>` : ''}
        <div class="card-meta">
          <span class="cat-tag" style="background:${cat.color}22;color:${cat.color}">${cat.icon} ${escapeHtml(cat.label)}</span>
          <span class="card-price">${formatPrice(it.price)}</span>
        </div>
      </div>
    </div>`;
  }

  window.renderAnzawa = function(){
    const q = (document.getElementById("anzawaSearch").value || '').toLowerCase();
    const sort = document.getElementById("anzawaSort").value;

    let list = ITEMS.filter(it => {
      if(currentCat !== "all" && it.category !== currentCat) return false;
      if(q && !it.name.toLowerCase().includes(q) && !(it.desc||'').toLowerCase().includes(q)) return false;
      return true;
    });

    document.getElementById("display-count").textContent = list.length;

    const grid = document.getElementById("menu-grid");
    if(list.length === 0){
      grid.innerHTML = `<div class="menu-grid"><div class="vehicle-empty"><div class="big-icon">🔍</div><p>該当するメニューが見つかりません</p></div></div>`;
      return;
    }

    if(q || sort === "name"){
      list.sort((a,b) => a.name.localeCompare(b.name));
      grid.innerHTML = `<div class="menu-grid">${list.map(renderItemCard).join('')}</div>`;
      return;
    }

    const byPrice = new Map();
    for(const it of list){
      if(!byPrice.has(it.price)) byPrice.set(it.price, []);
      byPrice.get(it.price).push(it);
    }
    for(const items of byPrice.values()){
      items.sort((a,b) => a.name.localeCompare(b.name));
    }

    const prices = [...byPrice.keys()].sort((a,b) => sort === "price-desc" ? b - a : a - b);

    grid.innerHTML = prices.map(price => {
      const items = byPrice.get(price);
      return `
        <div class="price-group-header">
          <span class="price-group-price">${formatPrice(price)}</span>
          <div class="price-group-line"></div>
          <span class="price-group-count">${items.length}品</span>
        </div>
        <div class="menu-grid">${items.map(renderItemCard).join('')}</div>
      `;
    }).join('');
  };

  function initStats(){
    document.getElementById("total-count").textContent = ITEMS.length;
    document.getElementById("food-count").textContent  = ITEMS.filter(i => i.category === "food").length;
    document.getElementById("drink-count").textContent = ITEMS.filter(i => i.category === "drink").length;
    document.getElementById("joint-count").textContent = ITEMS.filter(i => i.category === "joint").length;
  }

  initStats();
  buildCatFilters();
  renderAnzawa();
})();
</script>
</body>
</html>
