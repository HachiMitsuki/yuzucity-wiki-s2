<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css?v=s2-fix3">
</head>
<body data-page="socials">
<header class="topbar" id="topbar"></header>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main>
    <div class="s2-strip latest"></div>
    <nav class="breadcrumb"><a href="index.html">徐・・繝帙・繝</a><span class="breadcrumb-sep">窶ｺ</span><span>菴乗ｰ全NS</span></nav>
    <section>
      <div class="section-header">
        <h1 class="section-title"><span class="section-title-icon">撫</span>菴乗ｰ全NS</h1>
        <p class="section-subtitle">Discord 縺ｧ蜈ｱ譛峨＆繧後◆菴乗ｰ代・ X (Twitter) 繧｢繧ｫ繧ｦ繝ｳ繝井ｸ隕ｧ</p>
      </div>

      <div class="twitch-meta" id="socialsMeta">
        <span>譖ｴ譁ｰ: <span id="updatedAt">窶・/span></span>
        <span class="meta-dot"></span>
        <span id="countLabel">窶・繧｢繧ｫ繧ｦ繝ｳ繝・/span>
      </div>

      <div class="socials-grid" id="socialsGrid">
        <div class="twitch-empty" id="loadingState">
          <h3>隱ｭ縺ｿ霎ｼ縺ｿ荳ｭ窶ｦ</h3>
          <p>繧｢繧ｫ繧ｦ繝ｳ繝域ュ蝣ｱ繧貞叙蠕励＠縺ｦ縺・∪縺・/p>
        </div>
      </div>
    </section>
    <div id="pageNav"></div>
  </main>
</div>
<footer>
  豪 <strong>Yuzu City Wiki</strong> ﾂｷ 髱槫・蠑上ぎ繧､繝・&nbsp;|&nbsp;
  <a href="https://x.com/yuzu_server" target="_blank">撫 @yuzu_server</a>
</footer>
<script src="common.js?v=s2-fix2"></script>
<script>
(function(){
  const grid = document.getElementById('socialsGrid');
  const updatedAtEl = document.getElementById('updatedAt');
  const countLabelEl = document.getElementById('countLabel');

  function escapeHtml(s){
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function formatJst(iso){
    if(!iso) return '窶・;
    try{
      const d = new Date(iso);
      const fmt = new Intl.DateTimeFormat('ja-JP',{
        timeZone:'Asia/Tokyo',
        year:'numeric',month:'2-digit',day:'2-digit',
        hour:'2-digit',minute:'2-digit',
      });
      return fmt.format(d);
    }catch(_){ return iso; }
  }

  function renderCard(a){
    const handle = a.handle || '';
    const handleAt = `@${handle}`;
    // display_name is the X account "Name". If scraping failed, it'll be @handle 窶・
    // in that case suppress the duplicate second line.
    const name = a.display_name || handleAt;
    const showHandleRow = name !== handleAt;
    const profileUrl = a.profile_url || `https://x.com/${encodeURIComponent(handle)}`;
    // Primary avatar: real CDN URL from og:image if available.
    // Fallback chain handled by chained <img onerror>: real 竊・unavatar.io 竊・letter.
    const primaryAvatar = a.profile_image_url
      || `https://unavatar.io/x/${encodeURIComponent(handle)}`;
    const unavatarFallback = `https://unavatar.io/x/${encodeURIComponent(handle)}`;
    const fallbackLetter = escapeHtml((name.replace(/^@/, '') || '?')[0]);
    // Only chain to unavatar if the primary isn't already unavatar
    const useUnavatarChain = !primaryAvatar.includes('unavatar.io');
    const imgOnError = useUnavatarChain
      ? `if(this.dataset.fallback!=='1'){this.dataset.fallback='1';this.src='${unavatarFallback}';}else{this.style.display='none';this.nextElementSibling.style.display='flex';}`
      : `this.style.display='none';this.nextElementSibling.style.display='flex'`;
    return `
      <a href="${escapeHtml(profileUrl)}" target="_blank" rel="noopener" class="social-card">
        <div class="social-avatar-wrap">
          <img class="social-avatar" src="${escapeHtml(primaryAvatar)}" alt=""
               referrerpolicy="no-referrer"
               onerror="${imgOnError}">
          <div class="social-avatar-fallback" style="display:none">${fallbackLetter}</div>
        </div>
        <div class="social-info">
          <div class="social-name">${escapeHtml(name)}</div>
          ${showHandleRow ? `<div class="social-handle">${escapeHtml(handleAt)}</div>` : ''}
        </div>
        <div class="social-arrow">竊・/div>
      </a>
    `;
  }

  function renderEmpty(){
    return `
      <div class="twitch-empty">
        <h3>繧｢繧ｫ繧ｦ繝ｳ繝医′縺ｾ縺逋ｻ骭ｲ縺輔ｌ縺ｦ縺・∪縺帙ｓ</h3>
        <p>Discord 縺ｮ謖・ｮ壹メ繝｣繝ｳ繝阪Ν縺ｫ X (Twitter) 縺ｮURL繧呈兜遞ｿ縺吶ｋ縺ｨ縲√％縺薙↓陦ｨ遉ｺ縺輔ｌ縺ｾ縺吶・/p>
      </div>
    `;
  }

  function renderError(msg){
    return `
      <div class="twitch-empty">
        <h3>蜿門ｾ励↓螟ｱ謨励＠縺ｾ縺励◆</h3>
        <p>${escapeHtml(msg || 'socials.json 繧定ｪｭ縺ｿ霎ｼ繧√∪縺帙ｓ縺ｧ縺励◆')}</p>
      </div>
    `;
  }

  async function load(){
    try{
      const res = await fetch('socials.json?cb=' + Date.now(), {cache:'no-store'});
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const accounts = Array.isArray(data.accounts) ? data.accounts : [];

      updatedAtEl.textContent = formatJst(data.updated_at);
      countLabelEl.textContent = `${accounts.length} 繧｢繧ｫ繧ｦ繝ｳ繝・;

      if(accounts.length === 0){
        grid.innerHTML = renderEmpty();
        return;
      }

      accounts.sort((a,b) => (a.handle || '').localeCompare(b.handle || ''));
      grid.innerHTML = accounts.map(renderCard).join('');
    }catch(e){
      grid.innerHTML = renderError(e.message);
    }
  }

  load();
  setInterval(load, 5 * 60_000);
})();
</script>
</body>
</html>
