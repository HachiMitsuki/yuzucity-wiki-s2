<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YUZU CITY ／ SEASON 2 COMING SOON</title>
<meta name="description" content="Yuzu City — FiveM ロールプレイサーバー。Season 2 準備中。">
<meta property="og:title" content="YUZU CITY ／ SEASON 2 COMING SOON">
<meta property="og:description" content="『あったらいいなこんなもの。』を叶える街、第2章。準備中です。">
<meta property="og:type" content="website">
<link rel="stylesheet" href="styles.css">
<style>
  /* ===== Season 2 / Coming Soon — standalone landing ===== */
  body{ overflow:hidden; }

  .cs-wrap{
    position:relative;
    min-height:100svh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding:7vh 24px 9vh;
  }

  /* soft citrus glow behind the wordmark */
  .cs-wrap::before{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 60% 45% at 50% 38%, rgba(244,196,48,.12), transparent 62%),
      radial-gradient(ellipse 40% 30% at 50% 78%, rgba(127,176,79,.06), transparent 60%);
    pointer-events:none;
  }

  .cs-inner{ position:relative; z-index:1; max-width:780px; }

  .cs-kicker{
    font-family:var(--font-mono);
    font-size:.66rem; letter-spacing:.42em; text-indent:.42em;
    text-transform:uppercase; color:var(--yuzu);
    margin-bottom:1.7rem;
  }

  .cs-lemon{
    font-size:clamp(2.8rem,9vw,4rem); line-height:1;
    margin-bottom:1.1rem;
    filter:drop-shadow(0 8px 22px rgba(244,196,48,.32));
    animation:cs-float 6.5s var(--ease-out) infinite;
    will-change:transform;
  }
  @keyframes cs-float{
    0%,100%{ transform:translateY(0) rotate(-5deg); }
    50%{     transform:translateY(-12px) rotate(5deg); }
  }

  .cs-wordmark{
    font-family:var(--font-fat),"Fraunces",serif;
    font-size:clamp(2.7rem,12vw,6.6rem);
    line-height:.9; letter-spacing:.01em;
    color:var(--text);
    text-shadow:0 2px 30px rgba(0,0,0,.5);
  }

  .cs-season{
    display:flex; align-items:center; justify-content:center; gap:clamp(.8rem,3vw,1.4rem);
    font-family:var(--font-display); font-style:italic; font-weight:800;
    font-size:clamp(1.3rem,5vw,2.3rem);
    color:var(--yuzu);
    margin:1rem 0 1.5rem;
  }
  .cs-season::before, .cs-season::after{
    content:""; height:1px; width:clamp(26px,9vw,86px);
    background:linear-gradient(90deg,transparent,var(--yuzu-deep));
  }
  .cs-season::after{ background:linear-gradient(90deg,var(--yuzu-deep),transparent); }

  .cs-soon{
    display:inline-block;
    font-family:var(--font-mono); font-weight:700;
    font-size:clamp(.95rem,3.4vw,1.45rem);
    letter-spacing:.58em; text-indent:.58em; text-transform:uppercase;
    color:var(--text);
    padding:.55rem 0;
    background:linear-gradient(100deg,var(--text) 0%,var(--text) 38%,var(--yuzu-soft) 50%,var(--text) 62%,var(--text) 100%);
    background-size:220% 100%;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:cs-shine 5.5s linear infinite;
  }
  @keyframes cs-shine{
    0%{ background-position:120% 0; }
    100%{ background-position:-120% 0; }
  }

  .cs-rule{
    width:min(360px,72vw); height:1px; margin:2.4rem auto 0;
    background:linear-gradient(90deg,transparent,var(--line-bright),transparent);
  }

  .cs-tagline{
    font-family:var(--font-mincho); font-style:italic;
    font-size:clamp(1.02rem,3.4vw,1.32rem);
    color:var(--text); line-height:1.7;
    margin:2.2rem 0 1.1rem;
  }

  .cs-note{
    font-size:.86rem; color:var(--text-dim);
    line-height:2.05; margin:0 auto 2.4rem; max-width:33rem;
  }
  .cs-note strong{ color:var(--text); font-weight:500; }

  .cs-actions{
    display:flex; flex-wrap:wrap; gap:.8rem; justify-content:center;
  }
  .cs-btn{
    display:inline-flex; align-items:center; gap:.5rem;
    font-family:var(--font-mono); font-size:.78rem; font-weight:500;
    letter-spacing:.06em;
    padding:.85rem 1.4rem; border-radius:2px;
    border:1px solid var(--line-bright);
    color:var(--text); text-decoration:none;
    transition:transform .18s var(--ease-out), border-color .18s, background .18s, color .18s;
  }
  .cs-btn:hover{ transform:translateY(-2px); }
  .cs-btn-x:hover{ background:var(--text); color:var(--ink); border-color:var(--text); }
  .cs-btn-dc{ border-color:#5865F2; color:#aeb6ff; }
  .cs-btn-dc:hover{ background:#5865F2; color:#fff; }

  .cs-foot{
    position:absolute; bottom:3.2vh; left:0; right:0; z-index:1;
    font-family:var(--font-mono); font-size:.55rem; letter-spacing:.42em;
    text-transform:uppercase; color:var(--text-deep);
  }

  @media (prefers-reduced-motion: reduce){
    .cs-lemon, .cs-soon{ animation:none; }
    .cs-soon{ -webkit-text-fill-color:var(--text); color:var(--text); }
  }
</style>
</head>
<body>
  <main class="cs-wrap">
    <div class="cs-inner">
      <div class="cs-kicker">FiveM Roleplay Server</div>
      <div class="cs-lemon">🍋</div>
      <h1 class="cs-wordmark">YUZU CITY</h1>
      <div class="cs-season">SEASON&nbsp;2</div>
      <div class="cs-soon">Coming Soon</div>

      <div class="cs-rule"></div>

      <p class="cs-tagline">「あったらいいなこんなもの。」を叶える街、第2章。</p>
      <p class="cs-note">
        Season 1 は <strong>2026年5月31日</strong> をもって閉街しました。<br>
        たくさんのご参加、本当にありがとうございました。<br>
        現在 <strong>Season 2</strong> に向けて準備を進めています。続報は公式 X / Discord にて。
      </p>

      <div class="cs-actions">
        <a class="cs-btn cs-btn-x" href="https://x.com/yuzu_server" target="_blank" rel="noopener">𝕏&nbsp;&nbsp;@yuzu_server</a>
        <a class="cs-btn cs-btn-dc" href="https://discord.gg/gHCeUWFyyc" target="_blank" rel="noopener">Discord に参加</a>
      </div>
    </div>

    <div class="cs-foot">YUZU CITY ／ SEASON 02 ／ COMING SOON</div>
  </main>
</body>
</html>
