<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ディーラー カタログ（Season 1 アーカイブ） | Yuzu City Wiki</title>
<link rel="stylesheet" href="styles.css">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body data-page="dealer">
<header class="topbar" id="topbar"></header>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main>
    <div class="s2-strip catalog"></div>
    <div class="notice notice-info" style="margin-bottom:1.5rem">
      <div class="notice-title">📦 Season 1 Beta のアーカイブ</div>
      Season 1 Beta（2026.05.01–05.31）当時の記録です。 <a href="archive.html">S1アーカイブトップ</a> ／ <a href="index.html">Season 2 トップへ</a>
    </div>
    <nav class="breadcrumb"><a href="index.html">🏙️ ホーム</a><span class="breadcrumb-sep">›</span><span>ディーラー</span></nav>
    <section>
      <div class="section-header">
        <h1 class="section-title"><span class="section-title-icon">🚗</span>ディーラー カタログ</h1>
        <p class="section-subtitle">街で購入可能な車両・バイク・航空機・ボートの一覧</p>
      </div>

      <div class="dealer-stats">
        <div class="dealer-stat"><div class="dealer-stat-num" id="total-count">0</div><div class="dealer-stat-label">総車両数</div></div>
        <div class="dealer-stat"><div class="dealer-stat-num" id="in-stock-count">0</div><div class="dealer-stat-label">在庫あり</div></div>
        <div class="dealer-stat"><div class="dealer-stat-num" id="shop-count">0</div><div class="dealer-stat-label">ショップ</div></div>
      </div>

      <div class="dealer-controls">
        <div class="dealer-search">
          <span class="dealer-search-icon">🔍</span>
          <input type="text" id="dealerSearch" placeholder="車名で検索…" oninput="renderDealer()">
        </div>
        <select class="dealer-sort" id="dealerSort" onchange="renderDealer()">
          <option value="name">名前順</option>
          <option value="price-asc">価格: 安い順</option>
          <option value="price-desc">価格: 高い順</option>
        </select>
        <span class="dealer-count">表示中: <strong id="display-count">0</strong> 件</span>
      </div>

      <div class="shop-tabs" id="shop-tabs"></div>
      <div class="cat-filters" id="cat-filters"></div>
      <div class="vehicle-grid" id="vehicle-grid"></div>
    </section>
    <div id="pageNav"></div>
  </main>
</div>
<footer>
  🍋 <strong>Yuzu City Wiki</strong> · 非公式ガイド &nbsp;|&nbsp;
  <a href="https://x.com/yuzu_server" target="_blank">𝕏 @yuzu_server</a>
</footer>
<script src="common.js"></script>
<script src="vehicles_data.js"></script>
<script>
(function(){
  let currentShop = "all";
  let currentCat = "all";

  function formatPrice(p){
    if(p >= 100000000) return `¥${(p/100000000).toFixed(1)}億`;
    if(p >= 10000) return `¥${(p/10000).toFixed(0)}万`;
    return `¥${p.toLocaleString()}`;
  }

  function escapeHtml(s){
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function getShops(){
    const shops = new Set(VEHICLES.map(v => v.dealer));
    return ["all", ...Array.from(shops)];
  }

  function getCats(dealer){
    const filtered = dealer === "all" ? VEHICLES : VEHICLES.filter(v => v.dealer === dealer);
    return ["all", ...Array.from(new Set(filtered.map(v => v.category))).sort()];
  }

  function buildShopTabs(){
    const el = document.getElementById("shop-tabs");
    const shops = getShops();
    el.innerHTML = shops.map(s => {
      const info = SHOP_INFO[s] || { label: s, icon: "🏪", color: "#888" };
      const count = s === "all"
        ? VEHICLES.filter(v => v.stock > 0).length
        : VEHICLES.filter(v => v.dealer === s && v.stock > 0).length;
      const activeStyle = s === currentShop
        ? `style="border-color:${info.color};color:${info.color};background:${info.color}18"`
        : '';
      return `<div class="shop-tab${s === currentShop ? " active" : ""}" onclick="selectShop('${s}')" ${activeStyle}>
        <span class="tab-icon">${info.icon}</span>
        ${escapeHtml(info.label)}
        <span class="tab-count">${count}</span>
      </div>`;
    }).join("");
  }

  function buildCatFilters(){
    const el = document.getElementById("cat-filters");
    const cats = getCats(currentShop);
    el.innerHTML = cats.map(c => {
      const info = CAT_INFO[c] || { label: c, color: "#888", icon: "🚗" };
      const label = c === "all" ? "すべて" : info.label;
      const color = c === "all" ? "#f0c040" : info.color;
      const icon = c === "all" ? "🏪" : info.icon;
      return `<div class="cat-pill${c === currentCat ? " active" : ""}"
        style="background:${color}22;color:${color};border-color:${color}55"
        onclick="selectCat('${c}')">${icon} ${escapeHtml(label)}</div>`;
    }).join("");
  }

  window.selectShop = function(shop){
    currentShop = shop;
    currentCat = "all";
    buildShopTabs();
    buildCatFilters();
    renderDealer();
  };

  window.selectCat = function(cat){
    currentCat = cat;
    buildCatFilters();
    renderDealer();
  };

  window.renderDealer = function(){
    const q = (document.getElementById("dealerSearch").value || '').toLowerCase();
    const sort = document.getElementById("dealerSort").value;

    let list = VEHICLES.filter(v => {
      if(currentShop !== "all" && v.dealer !== currentShop) return false;
      if(currentCat !== "all" && v.category !== currentCat) return false;
      if(q && !v.model.toLowerCase().includes(q)) return false;
      return true;
    });

    if(sort === "price-asc") list.sort((a,b) => a.price - b.price);
    else if(sort === "price-desc") list.sort((a,b) => b.price - a.price);
    else list.sort((a,b) => a.model.localeCompare(b.model));

    document.getElementById("display-count").textContent = list.length;

    const grid = document.getElementById("vehicle-grid");
    if(list.length === 0){
      grid.innerHTML = `<div class="vehicle-empty"><div class="big-icon">🔍</div><p>該当する車両が見つかりません</p></div>`;
      return;
    }

    grid.innerHTML = list.map(v => {
      const catInfo = CAT_INFO[v.category] || { label: v.category, color: "#888", icon: "🚗" };
      const outOfStock = v.stock === 0;
      const modelDisplay = v.model.toLowerCase().trim();
      return `<div class="vehicle-card${outOfStock ? " out-of-stock" : ""}">
        <div class="card-img-wrap">
          <img
            src="https://cdn.jsdelivr.net/gh/Stuyk/gtav-image-archive@master/vehicles/${encodeURIComponent(modelDisplay)}.webp"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
            alt="${escapeHtml(v.model)}"
            loading="lazy">
          <div class="img-fallback">${catInfo.icon}</div>
          ${outOfStock ? '<span class="stock-badge">在庫なし</span>' : ""}
          <div class="cat-bar" style="background:${catInfo.color}"></div>
        </div>
        <div class="card-body">
          <div class="card-model">${escapeHtml(v.model.toUpperCase())}</div>
          <div class="card-meta">
            <span class="cat-tag" style="background:${catInfo.color}22;color:${catInfo.color}">${catInfo.icon} ${escapeHtml(catInfo.label)}</span>
            <span class="card-price">${formatPrice(v.price)}</span>
          </div>
        </div>
      </div>`;
    }).join("");
  };

  function initStats(){
    document.getElementById("total-count").textContent = VEHICLES.length;
    document.getElementById("in-stock-count").textContent = VEHICLES.filter(v => v.stock > 0).length;
    const shops = new Set(VEHICLES.map(v => v.dealer));
    document.getElementById("shop-count").textContent = shops.size;
  }

  initStats();
  buildShopTabs();
  buildCatFilters();
  renderDealer();
})();
</script>
</body>
</html>
